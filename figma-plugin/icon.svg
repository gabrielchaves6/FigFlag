    <g transform="rotate(240)"><rect x="-1.7" y="-22" width="3.4" height="19" rx="1.7"/></g>
    <g transform="rotate(300)"><rect x="-1.7" y="-22" width="3.4" height="19" rx="1.7"/></g>
